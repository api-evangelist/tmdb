                - include_image_language: rest.include_image_language
                - language: rest.language
              - outputParameters:
                - !!omap
                  - type: object
                  - mapping: $.
        - !!omap
          - path: /v1/collection/{collection_id}/translations
          - name: collection-collection-id-translations
          - description: REST surface for /3/collection/{collection_id}/translations.
          - operations:
            - !!omap
              - method: GET
              - name: collection-translations
              - description: TMDB Collections — Translations
              - call: tmdb-api-collections.collection-translations
              - with: !!omap
                - collection_id: rest.collection_id
              - outputParameters:
                - !!omap
                  - type: object
                  - mapping: $.
    - !!omap
      - type: mcp
      - namespace: tmdb-api-collections-mcp
      - port: 9090
      - transport: http
      - description: MCP adapter for TMDB API — Collections. One tool per consumed operation, routed inline through this capability's consumes block.
      - tools:
        - !!omap
          - name: details
          - description: TMDB Collections — Details
          - hints: !!omap
            - readOnly: true
            - destructive: false
            - idempotent: true
          - call: tmdb-api-collections.collection-details
          - with: !!omap
            - collection_id: tools.collection_id
            - language: tools.language
          - outputParameters:
            - !!omap
              - type: object
              - mapping: $.
        - !!omap
