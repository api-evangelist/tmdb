          - description: TMDB Collections — Images
          - hints: !!omap
            - readOnly: true
            - destructive: false
            - idempotent: true
          - call: tmdb-api-collections.collection-images
          - with: !!omap
            - collection_id: tools.collection_id
            - include_image_language: tools.include_image_language
            - language: tools.language
          - outputParameters:
            - !!omap
              - type: object
              - mapping: $.
        - !!omap
          - name: translations
          - description: TMDB Collections — Translations
          - hints: !!omap
            - readOnly: true
            - destructive: false
            - idempotent: true
          - call: tmdb-api-collections.collection-translations
          - with: !!omap
            - collection_id: tools.collection_id
          - outputParameters:
            - !!omap
              - type: object
              - mapping: $.
