!!omap
- naftiko: 1.0.0-alpha2
- info: !!omap
  - label: TMDB API — Find
  - description: |-
      TMDB — Find. 1 operations. Lead operation: TMDB Find — Find by ID. Self-contained Naftiko capability covering one TMDB business surface.
  - tags:
    - TMDB
    - Find
  - created: '2026-05-30'
  - modified: '2026-05-30'
- binds:
  - !!omap
    - namespace: env
    - keys: !!omap
      - TMDB_BEARER_TOKEN: TMDB_BEARER_TOKEN
- capability: !!omap
  - consumes:
    - !!omap
      - type: http
      - namespace: tmdb-api-find
      - baseUri: https://api.themoviedb.org
      - description: TMDB API — Find business capability. Self-contained, no shared references.
      - authentication: !!omap
        - type: bearer
        - token: '{{env.TMDB_BEARER_TOKEN}}'
      - resources:
        - !!omap
          - name: 3-find-external-id
          - path: /3/find/{external_id}
          - operations:
            - !!omap
              - name: find-by-id
              - method: GET
              - description: TMDB Find — Find by ID
              - inputParameters:
                - !!omap
                  - name: external_id
                  - in: path
                  - type: string
                  - required: true
                  - description: external_id parameter.
                - !!omap
                  - name: external_source
                  - in: query
                  - type: string
                  - required: true
                  - description: external_source parameter.
                - !!omap
                  - name: language
                  - in: query
                  - type: string
                  - required: false
                  - description: language parameter.
              - outputRawFormat: json
              - outputParameters:
                - !!omap
                  - name: result
                  - type: object
                  - value: $.
  - exposes:
    - !!omap
      - type: rest
      - namespace: tmdb-api-find-rest
      - port: 8080
      - description: REST adapter for TMDB API — Find. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      - resources:
        - !!omap
          - path: /v1/find/{external_id}
          - name: find-external-id
          - description: REST surface for /3/find/{external_id}.
          - operations:
            - !!omap
              - method: GET
              - name: find-by-id
              - description: TMDB Find — Find by ID
              - call: tmdb-api-find.find-by-id
              - with: !!omap
                - external_id: rest.external_id
                - external_source: rest.external_source
                - language: rest.language
              - outputParameters:
                - !!omap
                  - type: object
                  - mapping: $.
    - !!omap
      - type: mcp
      - namespace: tmdb-api-find-mcp
      - port: 9090
      - transport: http
      - description: MCP adapter for TMDB API — Find. One tool per consumed operation, routed inline through this capability's consumes block.
      - tools:
        - !!omap
          - name: find-id
          - description: TMDB Find — Find by ID
          - hints: !!omap
            - readOnly: true
            - destructive: false
            - idempotent: true
          - call: tmdb-api-find.find-by-id
          - with: !!omap
            - external_id: tools.external_id
            - external_source: tools.external_source
            - language: tools.language
          - outputParameters:
            - !!omap
              - type: object
              - mapping: $.
