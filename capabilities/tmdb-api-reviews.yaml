!!omap
- naftiko: 1.0.0-alpha2
- info: !!omap
  - label: TMDB API — Reviews
  - description: |-
      TMDB — Reviews. 1 operations. Lead operation: TMDB Reviews — Details. Self-contained Naftiko capability covering one TMDB business surface.
  - tags:
    - TMDB
    - Reviews
  - created: '2026-05-30'
  - modified: '2026-05-30'
- binds:
  - !!omap
    - namespace: env
    - keys: !!omap
      - TMDB_BEARER_TOKEN: TMDB_BEARER_TOKEN
- capability: !!omap
  - consumes:
    - !!omap
      - type: http
      - namespace: tmdb-api-reviews
      - baseUri: https://api.themoviedb.org
      - description: TMDB API — Reviews business capability. Self-contained, no shared references.
      - authentication: !!omap
        - type: bearer
        - token: '{{env.TMDB_BEARER_TOKEN}}'
      - resources:
        - !!omap
          - name: 3-review-review-id
          - path: /3/review/{review_id}
          - operations:
            - !!omap
              - name: review-details
              - method: GET
              - description: TMDB Reviews — Details
              - inputParameters:
                - !!omap
                  - name: review_id
                  - in: path
                  - type: string
                  - required: true
                  - description: review_id parameter.
              - outputRawFormat: json
              - outputParameters:
                - !!omap
                  - name: result
                  - type: object
                  - value: $.
  - exposes:
    - !!omap
      - type: rest
      - namespace: tmdb-api-reviews-rest
      - port: 8080
      - description: REST adapter for TMDB API — Reviews. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      - resources:
        - !!omap
          - path: /v1/review/{review_id}
          - name: review-review-id
          - description: REST surface for /3/review/{review_id}.
          - operations:
            - !!omap
              - method: GET
              - name: review-details
              - description: TMDB Reviews — Details
              - call: tmdb-api-reviews.review-details
              - with: !!omap
                - review_id: rest.review_id
              - outputParameters:
                - !!omap
                  - type: object
                  - mapping: $.
    - !!omap
      - type: mcp
      - namespace: tmdb-api-reviews-mcp
      - port: 9090
      - transport: http
      - description: MCP adapter for TMDB API — Reviews. One tool per consumed operation, routed inline through this capability's consumes block.
      - tools:
        - !!omap
          - name: details
          - description: TMDB Reviews — Details
          - hints: !!omap
            - readOnly: true
            - destructive: false
            - idempotent: true
          - call: tmdb-api-reviews.review-details
          - with: !!omap
            - review_id: tools.review_id
          - outputParameters:
            - !!omap
              - type: object
              - mapping: $.
