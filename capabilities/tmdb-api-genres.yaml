!!omap
- naftiko: 1.0.0-alpha2
- info: !!omap
  - label: TMDB API — Genres
  - description: |-
      TMDB — Genres. 2 operations. Lead operation: TMDB Genres — Movie List. Self-contained Naftiko capability covering one TMDB business surface.
  - tags:
    - TMDB
    - Genres
  - created: '2026-05-30'
  - modified: '2026-05-30'
- binds:
  - !!omap
    - namespace: env
    - keys: !!omap
      - TMDB_BEARER_TOKEN: TMDB_BEARER_TOKEN
- capability: !!omap
  - consumes:
    - !!omap
      - type: http
      - namespace: tmdb-api-genres
      - baseUri: https://api.themoviedb.org
      - description: TMDB API — Genres business capability. Self-contained, no shared references.
      - authentication: !!omap
        - type: bearer
        - token: '{{env.TMDB_BEARER_TOKEN}}'
      - resources:
        - !!omap
          - name: 3-genre-movie-list
          - path: /3/genre/movie/list
          - operations:
            - !!omap
              - name: genre-movie-list
              - method: GET
              - description: TMDB Genres — Movie List
              - inputParameters:
                - !!omap
                  - name: language
                  - in: query
                  - type: string
                  - required: false
                  - description: language parameter.
              - outputRawFormat: json
              - outputParameters:
                - !!omap
                  - name: result
                  - type: object
                  - value: $.
        - !!omap
          - name: 3-genre-tv-list
          - path: /3/genre/tv/list
          - operations:
            - !!omap
              - name: genre-tv-list
              - method: GET
              - description: TMDB Genres — TV List
              - inputParameters:
                - !!omap
                  - name: language
                  - in: query
                  - type: string
                  - required: false
                  - description: language parameter.
              - outputRawFormat: json
              - outputParameters:
                - !!omap
                  - name: result
                  - type: object
                  - value: $.
  - exposes:
    - !!omap
      - type: rest
      - namespace: tmdb-api-genres-rest
      - port: 8080
      - description: REST adapter for TMDB API — Genres. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      - resources:
        - !!omap
          - path: /v1/genre/movie/list
          - name: genre-movie-list
          - description: REST surface for /3/genre/movie/list.
          - operations:
            - !!omap
              - method: GET
              - name: genre-movie-list
              - description: TMDB Genres — Movie List
              - call: tmdb-api-genres.genre-movie-list
              - with: !!omap
                - language: rest.language
              - outputParameters:
                - !!omap
                  - type: object
                  - mapping: $.
        - !!omap
          - path: /v1/genre/tv/list
          - name: genre-tv-list
          - description: REST surface for /3/genre/tv/list.
          - operations:
            - !!omap
              - method: GET
              - name: genre-tv-list
              - description: TMDB Genres — TV List
              - call: tmdb-api-genres.genre-tv-list
              - with: !!omap
                - language: rest.language
              - outputParameters:
                - !!omap
                  - type: object
                  - mapping: $.
    - !!omap
      - type: mcp
      - namespace: tmdb-api-genres-mcp
      - port: 9090
      - transport: http
      - description: MCP adapter for TMDB API — Genres. One tool per consumed operation, routed inline through this capability's consumes block.
      - tools:
        - !!omap
          - name: movie-list
          - description: TMDB Genres — Movie List
          - hints: !!omap
            - readOnly: true
            - destructive: false
            - idempotent: true
          - call: tmdb-api-genres.genre-movie-list
          - with: !!omap
            - language: tools.language
          - outputParameters:
            - !!omap
              - type: object
              - mapping: $.
        - !!omap
          - name: tv-list
          - description: TMDB Genres — TV List
          - hints: !!omap
            - readOnly: true
            - destructive: false
            - idempotent: true
          - call: tmdb-api-genres.genre-tv-list
          - with: !!omap
            - language: tools.language
          - outputParameters:
            - !!omap
              - type: object
              - mapping: $.
