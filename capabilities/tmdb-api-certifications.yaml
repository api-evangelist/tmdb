!!omap
- naftiko: 1.0.0-alpha2
- info: !!omap
  - label: TMDB API — Certifications
  - description: |-
      TMDB — Certifications. 2 operations. Lead operation: TMDB Certifications — Movie Certifications. Self-contained Naftiko capability covering one TMDB business surface.
  - tags:
    - TMDB
    - Certifications
  - created: '2026-05-30'
  - modified: '2026-05-30'
- binds:
  - !!omap
    - namespace: env
    - keys: !!omap
      - TMDB_BEARER_TOKEN: TMDB_BEARER_TOKEN
- capability: !!omap
  - consumes:
    - !!omap
      - type: http
      - namespace: tmdb-api-certifications
      - baseUri: https://api.themoviedb.org
      - description: TMDB API — Certifications business capability. Self-contained, no shared references.
      - authentication: !!omap
        - type: bearer
        - token: '{{env.TMDB_BEARER_TOKEN}}'
      - resources:
        - !!omap
          - name: 3-certification-movie-list
          - path: /3/certification/movie/list
          - operations:
            - !!omap
              - name: certification-movie-list
              - method: GET
              - description: TMDB Certifications — Movie Certifications
              - outputRawFormat: json
              - outputParameters:
                - !!omap
                  - name: result
                  - type: object
                  - value: $.
        - !!omap
          - name: 3-certification-tv-list
          - path: /3/certification/tv/list
          - operations:
            - !!omap
              - name: certifications-tv-list
              - method: GET
              - description: TMDB Certifications — TV Certifications
              - outputRawFormat: json
              - outputParameters:
                - !!omap
                  - name: result
                  - type: object
                  - value: $.
  - exposes:
    - !!omap
      - type: rest
      - namespace: tmdb-api-certifications-rest
      - port: 8080
      - description: REST adapter for TMDB API — Certifications. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      - resources:
        - !!omap
          - path: /v1/certification/movie/list
          - name: certification-movie-list
          - description: REST surface for /3/certification/movie/list.
          - operations:
            - !!omap
              - method: GET
              - name: certification-movie-list
              - description: TMDB Certifications — Movie Certifications
              - call: tmdb-api-certifications.certification-movie-list
              - outputParameters:
                - !!omap
                  - type: object
                  - mapping: $.
        - !!omap
          - path: /v1/certification/tv/list
          - name: certification-tv-list
          - description: REST surface for /3/certification/tv/list.
          - operations:
            - !!omap
              - method: GET
              - name: certifications-tv-list
              - description: TMDB Certifications — TV Certifications
              - call: tmdb-api-certifications.certifications-tv-list
              - outputParameters:
                - !!omap
                  - type: object
                  - mapping: $.
    - !!omap
      - type: mcp
      - namespace: tmdb-api-certifications-mcp
      - port: 9090
      - transport: http
      - description: MCP adapter for TMDB API — Certifications. One tool per consumed operation, routed inline through this capability's consumes block.
      - tools:
        - !!omap
          - name: movie-certifications
          - description: TMDB Certifications — Movie Certifications
          - hints: !!omap
            - readOnly: true
            - destructive: false
            - idempotent: true
          - call: tmdb-api-certifications.certification-movie-list
          - outputParameters:
            - !!omap
              - type: object
              - mapping: $.
        - !!omap
          - name: tv-certifications
          - description: TMDB Certifications — TV Certifications
          - hints: !!omap
            - readOnly: true
            - destructive: false
            - idempotent: true
          - call: tmdb-api-certifications.certifications-tv-list
          - outputParameters:
            - !!omap
              - type: object
              - mapping: $.
