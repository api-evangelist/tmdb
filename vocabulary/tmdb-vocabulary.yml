  - personas:
    - !!omap
      - id: catalog-engineer
      - name: Catalog / Content Engineer
      - description: Engineer responsible for ingesting movie/TV metadata into a streaming or watch-tracker product.
      - workflows:
        - TMDB API — Movies
        - TMDB API — TV Series
        - TMDB API — People
        - TMDB API — Collections
        - TMDB API — Companies
        - TMDB API — Networks
        - TMDB API — Configuration
    - !!omap
      - id: discovery-product-manager
      - name: Discovery / Recommendations Product Manager
      - description: Owns browse, search, recommendations, and trending experiences in a media app.
      - workflows:
        - TMDB API — Discover
        - TMDB API — Search
        - TMDB API — Trending
        - TMDB API — Genres
        - TMDB API — Keywords
    - !!omap
      - id: availability-analyst
      - name: Availability / Watch Provider Analyst
      - description: Tracks where titles are available to stream/rent/buy per region using JustWatch-sourced data.
      - workflows:
        - TMDB API — Watch Providers
        - TMDB API — Find
    - !!omap
      - id: reviews-community-manager
      - name: Reviews & Community Manager
      - description: Surfaces community reviews and ratings; manages user lists, favorites, watchlists.
      - workflows:
        - TMDB API — Reviews
        - TMDB API — Lists
        - TMDB API — Account
        - TMDB API — Certifications
    - !!omap
      - id: identity-engineer
      - name: Identity / Session Engineer
      - description: Implements user, guest, and application authentication against TMDB v3 + v4.
      - workflows:
        - TMDB API — Authentication
        - TMDB API — Guest Sessions
        - TMDB API — Credits
